version: '3.9'

services:
  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ['CMD', 'bash', '-c', 'exec 3<>/dev/tcp/localhost/6333']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s

  embedding-service:
    build: ./embedding-service
    ports:
      - '8081:8081'
    environment:
      MODEL_NAME: all-MiniLM-L6-v2
      PORT: 8081
    mem_limit: 2g
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'python3', '-c', 'import urllib.request; urllib.request.urlopen("http://localhost:8081/health")']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  ingestion:
    build: ./ingestion
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
    environment:
      QDRANT_URL: 'qdrant:6334'
      REDIS_URL: 'redis://redis:6379'
      EMBEDDING_SERVICE_URL: 'http://embedding-service:8081'
      REPO_PATH: '/repos/target/kasoku'
      REPO_NAME: 'kasoku'
      WORKER_COUNT: '8'
      EMBEDDING_MODEL: 'all-MiniLM-L6-v2'
      POLL_INTERVAL_SEC: '30'
      ONESHOT: 'true'
      ONESHOT_TIMEOUT_SEC: '600'
    volumes:
      - './repos:/repos'
      - bm25_data:/data

  api:
    build: ./api
    ports:
      - '8000:8000'
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
    mem_limit: 2g
    restart: unless-stopped
    environment:
      QDRANT_URL: 'http://qdrant:6333'
      REDIS_URL: 'redis://redis:6379'
      EMBEDDING_MODEL: 'all-MiniLM-L6-v2'
      EMBEDDING_SERVICE_URL: 'http://embedding-service:8081'
      GROQ_API_KEY: '${GROQ_API_KEY}'
      GROQ_API_KEY_2: '${GROQ_API_KEY_2}'
      GROQ_API_KEY_3: '${GROQ_API_KEY_3}'
      RERANKER_MODEL: 'cross-encoder/ms-marco-MiniLM-L-2-v2'
      BM25_INDEX_PATH: '/data/bm25.pkl'
      HOST_REPO_PATH: '/repos/target'
      VSCODE_PATH_PREFIX: '/Users/cvlikhith/Manthan/codesearch/repos/target'
    volumes:
      - bm25_data:/data
      - /tmp/indexer:/tmp/indexer
      - /tmp/codesearch_repos:/tmp/codesearch_repos
      - ./repos:/repos

  frontend:
    build: ./frontend
    ports:
      - '80:80'
    depends_on:
      - api
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - '9090:9090'
    volumes:
      - './infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml'
      - prometheus_data:/prometheus
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - '3000:3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - 'grafana_data:/var/lib/grafana'
    depends_on:
      - prometheus
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    ports:
      - '7474:7474'
      - '7687:7687'
    environment:
      NEO4J_AUTH: neo4j/graphpassword
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ['CMD', 'neo4j', 'status']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  qdrant_data:
  redis_data:
  bm25_data:
  prometheus_data:
  grafana_data:
  neo4j_data:
  neo4j_logs:
