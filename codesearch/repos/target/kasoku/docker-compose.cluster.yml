version: '3.8'

services:
  node1:
    build: .
    container_name: kasoku-node1
    ports:
      - "9001:9000"
    environment:
      - KASOKU_NODE_ID=node1
      - KASOKU_HTTP_PORT=9000
      - KASOKU_CLUSTER_ENABLED=true
      - KASOKU_CLUSTER_PEERS=http://node2:9000,http://node3:9000
      - KASOKU_QUORUM_SIZE=2
      - KASOKU_READ_QUORUM=2
      - KASOKU_DATA_DIR=/data
    volumes:
      - kasoku-node1-data:/data
    restart: unless-stopped

  node2:
    build: .
    container_name: kasoku-node2
    ports:
      - "9002:9000"
    environment:
      - KASOKU_NODE_ID=node2
      - KASOKU_HTTP_PORT=9000
      - KASOKU_CLUSTER_ENABLED=true
      - KASOKU_CLUSTER_PEERS=http://node1:9000,http://node3:9000
      - KASOKU_QUORUM_SIZE=2
      - KASOKU_READ_QUORUM=2
      - KASOKU_DATA_DIR=/data
    volumes:
      - kasoku-node2-data:/data
    restart: unless-stopped

  node3:
    build: .
    container_name: kasoku-node3
    ports:
      - "9003:9000"
    environment:
      - KASOKU_NODE_ID=node3
      - KASOKU_HTTP_PORT=9000
      - KASOKU_CLUSTER_ENABLED=true
      - KASOKU_CLUSTER_PEERS=http://node1:9000,http://node2:9000
      - KASOKU_QUORUM_SIZE=2
      - KASOKU_READ_QUORUM=2
      - KASOKU_DATA_DIR=/data
    volumes:
      - kasoku-node3-data:/data
    restart: unless-stopped

volumes:
  kasoku-node1-data:
  kasoku-node2-data:
  kasoku-node3-data:
