apiVersion: v1
kind: Service
metadata:
  name: kasoku
  namespace: kasoku
spec:
  clusterIP: None
  selector:
    app: kasoku
  ports:
  - name: http
    port: 9000
    targetPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: kasoku-http
  namespace: kasoku
spec:
  type: LoadBalancer
  selector:
    app: kasoku
  ports:
  - name: http
    port: 80
    targetPort: 9000
