apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kasoku
  namespace: kasoku
spec:
  serviceName: kasoku
  replicas: 3
  selector:
    matchLabels:
      app: kasoku
  template:
    metadata:
      labels:
        app: kasoku
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9000"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: kasoku
        image: kasoku:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9000
          name: http
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_ID
          value: "$(POD_NAME)"
        - name: DATA_DIR
          value: "/data"
        - name: CLUSTER_ENABLED
          value: "true"
        - name: QUORUM_SIZE
          value: "1"
        - name: KASOKU_TRACING
          value: "true"
        - name: KASOKU_TRACING_EXPORTER
          value: "otlp"
        - name: KASOKU_OTLP_ENDPOINT
          value: "jaeger-collector.monitoring:4317"
        - name: KASOKU_OTLP_INSECURE
          value: "true"
        volumeMounts:
        - name: data
          mountPath: /data
        - name: config
          mountPath: /app/config.yaml
          subPath: config.yaml
        livenessProbe:
        # Added properly aligned HTTP probes
          httpGet:
            path: /health
            port: 9000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 9000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
        lifecycle:
          preStop:
            exec:
              command: ["/app/kasoku-server", "--shutdown"]
      volumes:
      - name: config
        configMap:
          name: kasoku-config
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
