# Kasoku Configuration File - Full Reference
# =========================
# Copy to configs/kasoku.yaml or use as a reference for customization.

# ------------------------------------------------------------------
# Server Settings
# ------------------------------------------------------------------

# Data directory for LSM storage (SSTables, WAL, manifests)
data_dir: ./data

# gRPC/HTTP server port
port: 9000
http_port: 9000

# Log level: debug, info, warn, error
log_level: warn

# Log file path (empty = stdout)
log_file: ""

# ------------------------------------------------------------------
# LSM Engine Settings
# ------------------------------------------------------------------

lsm:
  # Number of levels in LSM tree (5-7 typical)
  levels: 5

  # Size ratio between consecutive levels (10x = fewer levels = faster compaction)
  level_ratio: 10.0

  # Base size for L0 SSTable
  l0_base_size: 268435456  # 256MB

  # Key cache size (1M entries for high cache hit rate)
  key_cache_size: 1000000

# ------------------------------------------------------------------
# Compaction Settings
# ------------------------------------------------------------------

compaction:
  # Number of SSTables to trigger compaction
  threshold: 100000

  # Maximum concurrent compactions
  max_concurrent: 0

  # Size threshold for L0 compaction
  l0_size_threshold: 268435456  # 256MB

# ------------------------------------------------------------------
# Memory Settings
# ------------------------------------------------------------------

memory:
  # MemTable size in bytes
  memtable_size: 268435456  # 256MB

  # Maximum memory for all memtables
  max_memtable_bytes: 1073741824  # 1GB

  # Bloom filter false positive rate (0.01 = 1%)
  bloom_fp_rate: 0.01

  # Block cache size
  block_cache_size: 1073741824  # 1GB

# ------------------------------------------------------------------
# WAL (Write-Ahead Log) Settings
# ------------------------------------------------------------------

wal:
  # Async batch sync (false = async mode for throughput, true = sync every write)
  sync: false

  # Sync interval (500ms = batch more writes for better throughput)
  sync_interval: 500ms

  # Checkpoint interval in bytes (force sync after this much data)
  checkpoint_bytes: 1048576  # 1MB

  # WAL file size before rotation
  max_file_size: 67108864  # 64MB

# ------------------------------------------------------------------
# Cluster Settings (for distributed mode)
# ------------------------------------------------------------------

cluster:
  # Enable cluster mode
  enabled: false

  # Unique node ID
  node_id: node-1

  # Node address (for inter-node communication)
  node_addr: http://localhost:9000

  # Peer node addresses (all nodes in cluster)
  peers:
    - http://localhost:9000
    - http://localhost:9001
    - http://localhost:9002

  # Replication factor (number of replicas per key)
  replication_factor: 3

  # Write quorum (minimum acks required)
  quorum_size: 2

  # Read quorum (1 = eventual consistency, 2 = strong)
  read_quorum: 1

  # Virtual nodes per physical node (for consistent hashing)
  vnodes: 150

  # RPC timeout for inter-node communication (ms)
  rpc_timeout_ms: 500
